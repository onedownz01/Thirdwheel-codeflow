version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: codeflow
      POSTGRES_PASSWORD: codeflow
      POSTGRES_DB: codeflow
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  otel-collector:
    image: otel/opentelemetry-collector:0.106.1
    command: ['--config=/etc/otelcol/config.yaml']
    volumes:
      - ./collector/otel-collector.yaml:/etc/otelcol/config.yaml
    ports:
      - '4318:4318'
      - '4317:4317'

volumes:
  pg_data:
